<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="wayfinder">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>wayfinder</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="file-open-warning" style="display:none;max-width:760px;margin:40px auto;padding:20px;border:1px solid #d7dfed;border-radius:12px;background:#f7fbff;color:#142033;font-family:Segoe UI,Arial,sans-serif;line-height:1.5;">
    <h2 style="margin:0 0 8px;font-size:20px;">Wayfinder Web</h2>
    <p style="margin:0 0 10px;">This file was opened directly from disk (file://), so Flutter Web cannot start from the source web folder.</p>
    <p style="margin:0;">Use <strong>flutter run -d chrome</strong> for development, or open the built output from <strong>build/web</strong> through a web server.</p>
  </div>

  <script>
    (function () {
      if (window.location.protocol === 'file:') {
        var warning = document.getElementById('file-open-warning');
        if (warning) {
          warning.style.display = 'block';
        }
        return;
      }

      var script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
