<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="125" fill="#1E88E5" opacity="0.1"/>
  
  <!-- Bus body -->
  <g transform="translate(50, 40)">
    <!-- Main bus body -->
    <rect x="15" y="10" width="120" height="80" rx="8" fill="#1E88E5" stroke="#1565C0" stroke-width="2"/>
    
    <!-- Bus top section (darker) -->
    <rect x="15" y="10" width="120" height="25" rx="8" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
    
    <!-- Windows -->
    <rect x="28" y="20" width="18" height="15" rx="2" fill="#B3E5FC"/>
    <rect x="52" y="20" width="18" height="15" rx="2" fill="#B3E5FC"/>
    <rect x="76" y="20" width="18" height="15" rx="2" fill="#B3E5FC"/>
    <rect x="100" y="20" width="18" height="15" rx="2" fill="#B3E5FC"/>
    
    <!-- Lower windows -->
    <rect x="28" y="42" width="18" height="20" rx="2" fill="#81D4FA"/>
    <rect x="52" y="42" width="18" height="20" rx="2" fill="#81D4FA"/>
    <rect x="76" y="42" width="18" height="20" rx="2" fill="#81D4FA"/>
    <rect x="100" y="42" width="18" height="20" rx="2" fill="#81D4FA"/>
    
    <!-- Door -->
    <rect x="120" y="40" width="13" height="35" rx="2" fill="#0D47A1" stroke="#1565C0" stroke-width="1"/>
    <line x1="126.5" y1="40" x2="126.5" y2="75" stroke="#1565C0" stroke-width="1"/>
    
    <!-- Front bumper -->
    <rect x="15" y="88" width="120" height="6" rx="2" fill="#FFA726" stroke="#FF6F00" stroke-width="1"/>
    
    <!-- Wheels -->
    <circle cx="32" cy="105" r="8" fill="#424242" stroke="#212121" stroke-width="1.5"/>
    <circle cx="32" cy="105" r="5" fill="#757575"/>
    <circle cx="118" cy="105" r="8" fill="#424242" stroke="#212121" stroke-width="1.5"/>
    <circle cx="118" cy="105" r="5" fill="#757575"/>
    
    <!-- Wheel hubs -->
    <circle cx="32" cy="105" r="2" fill="#FFF"/>
    <circle cx="118" cy="105" r="2" fill="#FFF"/>
    
    <!-- Direction arrow accent -->
    <path d="M 110 50 L 120 50 L 120 40" stroke="#FFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>
  
  <!-- Forward motion indicator (subtle lines) -->
  <line x1="20" y1="100" x2="35" y2="100" stroke="#1E88E5" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="15" y1="115" x2="30" y2="115" stroke="#1E88E5" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
</svg>
